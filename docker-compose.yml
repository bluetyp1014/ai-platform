services:

  frontend:
    build: ./frontend
    container_name: ai-frontend
    ports:
      - "3003:3000"
    environment:
      - WATCHPACK_POLLING=true  
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: ai-api
    ports:
      - "8003:8000"
    env_file:
      - ./backend/.env.docker  
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_platform
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: ai-redis
    ports:
      - "6379:6379"

